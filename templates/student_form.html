<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Payment Form</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>

<body>
    <div class="form-container">
        <h2>Student Payment Form</h2>
        <form action="/student" method="POST">
            <label for="enrollment">Enrollment No:</label>
            <input type="text" id="enrollment" name="enrollment" required>

            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email ID:</label>
            <input type="email" id="email" name="email" required>

            <label for="course">Course:</label>
            <input type="text" id="course" name="course" required>

            <label for="stream">Stream:</label>
            <select id="stream" name="stream" required>
                <option value="">--Select Stream--</option>
                <option value="CSE">CSE</option>
                <option value="ECE">ECE</option>
                <option value="CSE-AIML">CSE-AIML</option>
                <option value="CS-IT">CS-IT</option>
                <option value="CST">CST</option>
                <option value="CSE-IOT">CSE-IOT</option>
                <option value="CS-CYBER SECURITY">CS-CYBER SECURITY</option>
                <option value="CSE-Data Sc.">CSE-Data Sc.</option>
                <option value="Electrical">Electrical</option>
                <option value="Mechanical">Mechanical</option>
                <option value="Civil">Civil</option>
                <option value="Bio-tech">Bio-tech</option>
                <option value="IT">IT</option>
            </select>

            <label for="year">Year:</label>
            <select id="year" name="year" required>
                <option value="">--Select Year--</option>
                <option value="1">1st Year</option>
                <option value="2">2nd Year</option>
                <option value="3">3rd Year</option>
                <option value="4">4th Year</option>
            </select>

            <label for="semester">Semester:</label>
            <select id="semester" name="semester" required>
                <option value="">--Select Semester--</option>
                <option value="1">Semester 1</option>
                <option value="2">Semester 2</option>
                <option value="3">Semester 3</option>
                <option value="4">Semester 4</option>
                <option value="5">Semester 5</option>
                <option value="6">Semester 6</option>
                <option value="7">Semester 7</option>
                <option value="8">Semester 8</option>
            </select>

            <label for="fees_for">Fees For (Semester):</label>
            <input type="text" id="fees_for" name="fees_for" required>

            <label for="amount">Amount Paid:</label>
            <input type="number" id="amount" name="amount" step="0.01" required>

            <label for="date">Date of Payment:</label>
            <input type="date" id="date" name="date" required>

            <label for="section">Section:</label>
            <input type="text" id="section" name="section" required>

            <label for="roll_no">Class Roll No:</label>
            <input type="number" id="roll_no" name="roll_no" required>

            <label for="bank_branch">Bank Branch:</label>
            <input type="text" id="bank_branch" name="bank_branch" placeholder="Enter your bank branch" required>

            <label for="account_number">Account Number:</label>
            <input type="text" id="account_number" name="account_number" placeholder="Enter your account number"
                required>

            <label for="UTR NUMBER">UTR NUMBER:</label>
            <input type="text" id="ifsc_code" name="ifsc_code" placeholder="Enter your UTR NUMBER" required>


            <button type="submit" class="btn">Submit</button>
        </form>
    </div>
</body>
<style>
    body{
        background-image: url('/static/images/frm2.jpg');
        background-size: 1520px;
        background-position: center;
        height: 90vh;
    }
</style>

</html>
